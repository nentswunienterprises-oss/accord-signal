<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{DOCUMENT_TITLE}}</title>
</head>
<body style="margin:0; padding:24px; background:#f6f3ee; color:#232426; font-family:Manrope, Arial, sans-serif;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:720px; margin:0 auto; background:#fffdfa; border:1px solid rgba(35,36,38,0.1); border-radius:24px; overflow:hidden;">
    <tr>
      <td style="padding:32px 32px 20px; background:linear-gradient(135deg, #fbf8f2 0%, #eef0e2 100%);">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
          <tr>
            <td style="vertical-align:top;">
              <img src="{{LOGO_URL}}" alt="Accord Signal" width="72" height="72" style="display:block; width:72px; height:72px; border:0;">
            </td>
            <td style="vertical-align:top; text-align:right;">
              <div style="font-family:'Space Grotesk', Arial, sans-serif; font-size:12px; letter-spacing:0.24em; text-transform:uppercase; color:#6b6f3d;">{{BRAND_TAGLINE}}</div>
              <div style="font-family:'Space Grotesk', Arial, sans-serif; font-size:28px; letter-spacing:0.08em; text-transform:uppercase; color:#232426; margin-top:10px;">{{BRAND_NAME}}</div>
              <div style="margin-top:14px; font-size:13px; line-height:1.7; color:#575b31;">{{DATE}}<br>{{REFERENCE_NUMBER}}</div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td style="padding:32px;">
        <div style="font-family:'Space Grotesk', Arial, sans-serif; font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:#6b6f3d;">{{DOCUMENT_TYPE}}</div>
        <h1 style="margin:12px 0 10px; font-family:'Space Grotesk', Arial, sans-serif; font-size:34px; line-height:1.04; letter-spacing:-0.04em; color:#232426;">{{DOCUMENT_TITLE}}</h1>
        <p style="margin:0 0 20px; font-size:16px; line-height:1.75; color:#575b31;">Prepared for {{CLIENT_NAME}}</p>
        <div style="padding:18px 20px; border-radius:18px; background:#f6f3ee; margin-bottom:24px;">
          <div style="font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#6b6f3d; font-family:'Space Grotesk', Arial, sans-serif;">Subject</div>
          <div style="margin-top:8px; font-size:16px; line-height:1.65; color:#232426;">{{SUBJECT}}</div>
        </div>
        <div style="font-size:16px; line-height:1.8; color:#232426;">
          {{BODY}}
        </div>
      </td>
    </tr>
    <tr>
      <td style="padding:24px 32px 30px; border-top:1px solid rgba(35,36,38,0.08); color:#66686e; font-size:13px; line-height:1.7;">
        {{FOOTER}}
      </td>
    </tr>
  </table>
</body>
</html>
