<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{DOCUMENT_TITLE}}</title>
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f6f3ee;
      color: #232426;
      font-family: "Manrope", Arial, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page-shell {
      position: relative;
      min-height: 100vh;
      padding: 20mm 16mm 22mm;
      background:
        radial-gradient(circle at top left, rgba(107, 111, 61, 0.12), transparent 30%),
        linear-gradient(180deg, #fbf8f2 0%, #f6f3ee 100%);
    }

    .page-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.12;
      background:
        linear-gradient(90deg, rgba(35, 36, 38, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(35, 36, 38, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
      {{REFERENCE_BACKGROUND_STYLE}}
    }

    .document-card {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 42mm);
      padding: 18mm 16mm 16mm;
      border: 1px solid rgba(35, 36, 38, 0.1);
      border-radius: 26px;
      background: rgba(255, 253, 250, 0.94);
      box-shadow: 0 18px 60px rgba(35, 36, 38, 0.08);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }

    .document-card::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 76mm;
      height: 44mm;
      background: linear-gradient(135deg, rgba(107, 111, 61, 0.18), rgba(107, 111, 61, 0.02));
      clip-path: polygon(100% 0, 100% 100%, 0 0);
      border-top-right-radius: 26px;
    }

    .header {
      display: table;
      width: 100%;
      margin-bottom: 12mm;
    }

    .header-left,
    .header-right {
      display: table-cell;
      vertical-align: top;
    }

    .brand-lockup {
      display: inline-block;
      width: 56mm;
      text-align: center;
    }

    .brand-symbol {
      display: block;
      width: 33mm;
      height: 33mm;
      margin: 0 auto;
    }

    .logo-olive { fill: #6f734a; }
    .logo-charcoal { fill: #2a2d33; }
    .logo-slate { fill: #6d7075; }
    .logo-mist { fill: #cbc8c2; }

    .brand-tagline,
    .meta-label {
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: 7.2pt;
      font-weight: 700;
      letter-spacing: 0.23em;
      text-transform: uppercase;
      color: #6f734a;
    }

    .brand-tagline {
      margin-top: 1.6mm;
    }

    .brand-name {
      margin-top: 1.2mm;
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: 12.4pt;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: #25282e;
    }

    .header-right {
      text-align: right;
    }

    .meta-value {
      margin-top: 2mm;
      font-size: 10pt;
      line-height: 1.7;
      color: #575b31;
    }

    .title-label {
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: 8.5pt;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6b6f3d;
    }

    h1 {
      margin: 3mm 0 3mm;
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: 28pt;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .client-line {
      margin: 0 0 8mm;
      color: #575b31;
      font-size: 11pt;
    }

    .subject-box {
      margin-bottom: 8mm;
      padding: 5mm;
      border-radius: 5mm;
      background: #f6f3ee;
      border: 1px solid rgba(35, 36, 38, 0.08);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .body {
      font-size: 11pt;
      line-height: 1.8;
    }

    .body h1,
    .body h2,
    .body h3 {
      margin: 8mm 0 3mm;
      font-family: "Space Grotesk", Arial, sans-serif;
      line-height: 1.1;
      break-after: avoid-page;
      page-break-after: avoid;
    }

    .body h2 {
      font-size: 16pt;
    }

    .body h3 {
      font-size: 13pt;
    }

    .body p,
    .body ul,
    .body ol,
    .body blockquote,
    .body table {
      margin: 0 0 4mm;
      orphans: 3;
      widows: 3;
    }

    .body ul,
    .body ol {
      padding-left: 6mm;
    }

    .body blockquote {
      padding: 4mm 5mm;
      border-left: 1.2mm solid #6b6f3d;
      background: rgba(107, 111, 61, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
    }

    th,
    td {
      padding: 3mm;
      border-bottom: 1px solid rgba(35, 36, 38, 0.12);
      text-align: left;
      vertical-align: top;
    }

    th {
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: 8pt;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #575b31;
    }

    .footer {
      position: absolute;
      left: 16mm;
      right: 16mm;
      bottom: 12mm;
      padding-top: 4mm;
      border-top: 1px solid rgba(35, 36, 38, 0.08);
      font-size: 9pt;
      color: #66686e;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="document-card">
      <header class="header">
        <div class="header-left">
          <div class="brand-lockup" aria-label="{{BRAND_NAME}}">
            <svg class="brand-symbol" viewBox="206 138 190 188" role="img" aria-hidden="true">
              <path class="logo-olive" d="M2130 4165 l0 -405 195 0 195 0 0 205 0 205 205 0 205 0 0 200 0 200 -400 0 -400 0 0 -405z" transform="translate(0,600) scale(0.1,-0.1)"/>
              <path class="logo-charcoal" d="M3085 4370 l0 -201 203 3 202 3 0 -207 0 -208 195 0 195 0 0 405 0 405 -397 0 -398 0 0 -200z" transform="translate(0,600) scale(0.1,-0.1)"/>
              <path class="logo-olive" d="M2850 3683 l0 -158 152 2 153 2 3 156 3 155 -156 0 -155 0 0 -157z" transform="translate(0,600) scale(0.1,-0.1)"/>
              <path class="logo-slate" d="M2130 3200 l0 -400 400 0 400 0 0 195 0 195 -205 0 -205 0 0 205 0 205 -195 0 -195 0 0 -400z" transform="translate(0,600) scale(0.1,-0.1)"/>
              <path class="logo-mist" d="M3492 3395 l3 -205 -205 0 -205 0 0 -195 0 -195 398 0 397 0 0 400 0 400 -195 0 -196 0 3 -205z" transform="translate(0,600) scale(0.1,-0.1)"/>
            </svg>
            <div class="brand-tagline">{{BRAND_TAGLINE}}</div>
            <div class="brand-name">{{BRAND_NAME}}</div>
          </div>
        </div>
        <div class="header-right">
          <div class="meta-label">Date</div>
          <div class="meta-value">{{DATE}}</div>
          <div class="meta-label" style="margin-top:4mm;">Reference</div>
          <div class="meta-value">{{REFERENCE_NUMBER}}</div>
        </div>
      </header>

      <div class="title-label">{{DOCUMENT_TYPE}}</div>
      <h1>{{DOCUMENT_TITLE}}</h1>
      <p class="client-line">Prepared for {{CLIENT_NAME}}</p>

      <div class="subject-box">
        <div class="meta-value">{{SUBJECT}}</div>
      </div>

      <section class="body">{{BODY}}</section>
      <footer class="footer">{{FOOTER}}</footer>
    </div>
  </div>
</body>
</html>
